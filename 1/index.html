<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home page</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo-wrapper">
                <a href="#" class="logo">
                    <img src="logo.svg">
                </a>
                <a href="#" class="Name">
                    <img src="name.svg">
                </a>
            </div>
            <nav>
                <ul class="nav-list">
                    <li><a href="#" class="nav-link active">Home</a></li>
                    <li><a href="#" class="nav-link">Features</a></li>
                    <li><a href="#" class="nav-link">Company</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="lang-select-container">
                    <select id="langSelect">
                        <option value="en">EN</option>
                        <option value="ru">RU</option>
                    </select>
                </div>
                <a href="#" class="btn-signin">Sign In</a>
            </div>
        </div>
    </header>

    <main class="main-section">
        <div class="container">
            <div class="main-content">
                <h1 class="title">Value Proposition</h1>
                
                <div class="hero-actions">
                    <a href="#" class="btn-primary">Start Now</a>
                    <span class="btn-subtext">30 Days Trial</span>
                </div>
            </div>

            <div class="images">
                <div class="mockup-desktop">
                    <img src="desktop.svg" alt="Desktop">
                </div>
                <div class="mockup-phone">
                    <img src="phone.svg" alt="Phone">
                </div>
            </div>
        </div>

        <div class="hero-bg-shape"></div>
        <div class="hero-bg-shape-top"></div>
    </main>

</body>
</html>
