<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo-wrapper">
                <a href="#" class="logo">
                    <img src="logo.svg" alt="Tinvio Logo" class="logo-img"> 
                </a>
                <div class="lang-select-container">
                    <button class="lang-button" id="langBtn">
                        <span id="currentLang">EN</span>
                        <span class="arrow-down">▾</span>
                    </button>
                    <ul class="lang-dropdown" id="langDropdown">
                        <li data-lang="en">EN</li>
                        <li data-lang="ru">RU</li>
                    </ul>
                </div>
            </div>

            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="#" class="nav-link active">Home</a></li>
                    <li><a href="#" class="nav-link">Features</a></li>
                    <li><a href="#" class="nav-link">Company</a></li>
                </ul>
            </nav>

            <div class="header-actions">
                <a href="#" class="btn-primary">Get Started</a>
            </div>

        </div>
    </header>

    <main class="hero">
        <div class="hero-container">

            <div class="hero-content">
                <div class="hero-decor">✨</div>
                
                <h1 class="hero-title">
                    Collecting payments <br>
                    <span class="highlight">is easy</span>, right?
                </h1>
                
                <p class="hero-description">
                    Manage all your supply chain transactions in one dashboard. 
                    Get paid faster, reconcile quicker, grow bigger.
                </p>
                
                <a href="#" class="btn-hero">Get Started Now</a>
                
                <p class="hero-note">It's free to try! 💡</p>
            </div>

            <div class="hero-mockups">
                <div class="mockup-placeholder">
                    Здесь будут экраны приложения
                </div>
            </div>

        </div>
    </main>

</body>
</html>
